<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elayon - Apresentação</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen flex-col items-center justify-center bg-[#050708] text-[#dff0f0] px-6 font-sans relative overflow-hidden">

    <div class="absolute inset-0 pointer-events-none z-0 bg-[radial-gradient(ellipse_60%_40%_at_50%_0%,rgba(62,207,207,0.06)_0%,transparent_65%)]"></div>

    <main class="relative z-10 w-full max-w-sm text-center space-y-8">
        
        <div class="flex flex-col items-center space-y-4">
            <div class="w-28 h-28 overflow-hidden rounded-2xl bg-white p-2 shadow-xl shadow-[#3ecfcf]/5 flex items-center justify-center">
                <img 
                    src="elayon_logo.png" 
                    alt="Elayon Logo" 
                    class="w-full h-full object-contain"
                >
            </div>
            
            <div class="space-y-2">
                <span class="font-mono text-[10px] uppercase tracking-[0.3em] text-[#3ecfcf] block">
                    Apresentação Oficial
                </span>
                <h1 class="text-3xl font-extrabold tracking-tight text-white font-sans">
                    ELAYON
                </h1>
                <p class="text-xs text-slate-400 max-w-xs mx-auto leading-relaxed font-light">
                    Humanidade e Tecnologia em Harmonia.
                </p>
            </div>
        </div>

        <div class="rounded-2xl border border-white/[0.06] bg-slate-900/40 p-4 backdrop-blur-md">
            <p class="font-mono text-[11px] text-[#3ecfcf]">
                AMBIENTE ESTÁTICO PRONTO
            </p>
        </div>

        <div>
            <a 
                href="calibracao.html" 
                class="block w-full text-center py-4 rounded-xl bg-[#3ecfcf] text-[#050708] font-mono text-xs font-bold tracking-[0.2em] uppercase transition-all duration-300 shadow-[0_4px_20px_rgba(62,207,207,0.2)] hover:opacity-90 active:scale-[0.98]"
            >
                AVANÇAR PARA CALIBRAÇÃO
            </a>
        </div>

    </main>

    <footer class="absolute bottom-6 font-mono text-[8px] tracking-widest text-slate-700">
        ELAYON CORE SYSTEM
    </footer>

</body>
</html>
