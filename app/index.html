<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elayon - Apresentação</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen flex-col items-center justify-center bg-[#050708] text-[#dff0f0] px-6 font-sans">

    <main class="w-full max-w-sm text-center space-y-8">
        
        <div class="flex flex-col items-center space-y-4">
            <div class="w-32 h-32 overflow-hidden rounded-2xl bg-white p-2 shadow-lg shadow-[#3ecfcf]/10 flex items-center justify-center">
                <img 
                    src="elayon_logo.png" 
                    alt="Elayon Logo" 
                    class="w-full h-full object-contain"
                >
            </div>
            
            <div class="space-y-2">
                <span class="font-mono text-[10px] uppercase tracking-[0.3em] text-[#3ecfcf] block">
                    Apresentação Oficial
                </span>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">
                    ELAYON
                </h1>
                <p class="text-xs text-slate-400 max-w-xs mx-auto leading-relaxed font-light">
                    Humanidade e Tecnologia em Harmonia.
                </p>
            </div>
        </div>

        <div class="rounded-2xl border border-white/[0.06] bg-slate-900/40 p-4">
            <p class="font-mono text-[11px] text-slate-400">
                Interface estática pronta para demonstração.
            </p>
        </div>

        <div>
            <a 
                href="calibracao.html" 
                class="block w-full text-center py-4 rounded-xl bg-[#3ecfcf] text-[#050708] font-mono text-xs font-bold tracking-[0.2em] uppercase transition-all shadow-[0_4px_20px_rgba(62,207,207,0.2)] hover:opacity-90 active:scale-[0.98]"
            >
                AVANÇAR PARA CALIBRAÇÃO
            </a>
        </div>

    </main>

</body>
</html>
